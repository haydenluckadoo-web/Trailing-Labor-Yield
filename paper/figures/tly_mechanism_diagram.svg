<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="760" viewBox="0 0 1660 760" role="img" aria-labelledby="title desc">
  <title id="title">Trailing Labor Yield mechanism diagram</title>
  <desc id="desc">A two-panel diagram showing that the next historical pay pool is the sum of the prior historical pool, current base pay, and current active bonus, and that only the terminal active bonus is snapshotted into the tapered legacy payout.</desc>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 z" fill="#1f2937" />
    </marker>
    <style>
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .panel-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .small { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .mono { font: 600 18px Menlo, Consolas, Monaco, monospace; fill: #111827; }
      .mono-small { font: 600 15px Menlo, Consolas, Monaco, monospace; fill: #111827; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .box { stroke: #1f2937; stroke-width: 2.5; rx: 12; ry: 12; }
      .stack-outline { fill: #ffffff; stroke: #1f2937; stroke-width: 3; rx: 14; ry: 14; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 3.5; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; ry: 12; }
      .dashed { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1660" height="760" fill="#ffffff" />

  <text x="52" y="48" class="title">Trailing Labor Yield (TLY)</text>
  <text x="52" y="76" class="subtitle">The historical pay pool grows by the sum of prior pool, current base pay, and current active bonus. Only the terminal active bonus becomes the trailing payout basis.</text>

  <rect class="panel" x="40" y="110" width="980" height="600" />
  <rect class="panel" x="1060" y="110" width="560" height="600" />

  <text x="68" y="150" class="panel-title">Active State: one settled epoch</text>
  <text x="68" y="178" class="body">These are the parts that determine the next historical pay pool.</text>

  <rect class="box" x="88" y="220" width="270" height="92" fill="#dbeafe" />
  <text x="223" y="255" text-anchor="middle" class="label">Prior Historical Pool</text>
  <text x="223" y="280" text-anchor="middle" class="mono-small">H_t</text>
  <text x="223" y="300" text-anchor="middle" class="small">already accumulated from earlier epochs</text>

  <rect class="box" x="88" y="355" width="270" height="92" fill="#dcfce7" />
  <text x="223" y="390" text-anchor="middle" class="label">Current Base Pay</text>
  <text x="223" y="415" text-anchor="middle" class="mono-small">B_t</text>
  <text x="223" y="435" text-anchor="middle" class="small">new cash compensation for this epoch</text>

  <rect class="box" x="412" y="272" width="320" height="132" fill="#fef3c7" />
  <text x="572" y="307" text-anchor="middle" class="label">Current Active Bonus</text>
  <text x="572" y="336" text-anchor="middle" class="mono">A_t = alpha (H_t + B_t)</text>
  <text x="572" y="362" text-anchor="middle" class="small">small accrual share on historical pay plus current base pay</text>
  <text x="572" y="384" text-anchor="middle" class="small">this is the only piece later snapshotted at exit</text>

  <text x="804" y="184" class="panel-title">Next Historical Pay Pool</text>
  <text x="804" y="212" class="mono">H_(t+1) = H_t + B_t + A_t</text>

  <rect class="stack-outline" x="804" y="238" width="180" height="296" />
  <rect x="804" y="238" width="180" height="94" rx="12" ry="12" fill="#dbeafe" />
  <rect x="804" y="332" width="180" height="94" fill="#dcfce7" />
  <rect x="804" y="426" width="180" height="108" rx="12" ry="12" fill="#fef3c7" />

  <text x="894" y="274" text-anchor="middle" class="mono-small">H_t</text>
  <text x="894" y="294" text-anchor="middle" class="small">prior pool carried forward</text>

  <text x="894" y="368" text-anchor="middle" class="mono-small">B_t</text>
  <text x="894" y="388" text-anchor="middle" class="small">base pay added this epoch</text>

  <text x="894" y="472" text-anchor="middle" class="mono-small">A_t</text>
  <text x="894" y="492" text-anchor="middle" class="small">active bonus added this epoch</text>

  <path class="arrow" d="M358 266 H804" />
  <path class="arrow" d="M358 401 H804" />
  <path class="arrow" d="M732 338 L804 480" />

  <rect class="note" x="760" y="566" width="268" height="88" />
  <text x="894" y="598" text-anchor="middle" class="label">Growth Mechanism</text>
  <text x="894" y="622" text-anchor="middle" class="small">If the contributor remains active, the next epoch</text>
  <text x="894" y="642" text-anchor="middle" class="small">starts from this larger historical pay pool.</text>
  <path class="arrow" d="M894 534 V566" />

  <text x="1088" y="150" class="panel-title">Exit and Legacy State</text>
  <text x="1088" y="178" class="body">Departure snapshots the terminal active bonus, not the full historical pay pool.</text>

  <rect class="box" x="1108" y="250" width="462" height="126" fill="#fee2e2" />
  <text x="1339" y="286" text-anchor="middle" class="label">Exit Snapshot</text>
  <text x="1339" y="315" text-anchor="middle" class="mono">R = A_exit</text>
  <text x="1339" y="340" text-anchor="middle" class="small">only the final active bonus is locked in</text>
  <text x="1339" y="362" text-anchor="middle" class="small">the accumulated historical pay pool is not directly paid out</text>

  <rect class="box" x="1108" y="452" width="462" height="152" fill="#ede9fe" />
  <text x="1339" y="490" text-anchor="middle" class="label">Trailing Legacy Payout</text>
  <text x="1339" y="521" text-anchor="middle" class="mono">Payout_s = R * rho^s</text>
  <text x="1339" y="548" text-anchor="middle" class="small">claimable each epoch through a pull flow</text>
  <text x="1339" y="570" text-anchor="middle" class="small">tapers over a fixed duration instead of compounding forever</text>

  <rect class="note" x="1108" y="628" width="462" height="56" />
  <text x="1339" y="662" text-anchor="middle" class="small">In the contracts, missed legacy epochs can be claimed in bounded batches.</text>

  <path class="arrow" d="M732 322 C880 322, 970 300, 1108 300" />
  <text x="931" y="288" text-anchor="middle" class="small">if contributor exits here</text>

  <path class="arrow" d="M1339 376 V452" />

  <path class="dashed" d="M1018 110 V710" />
</svg>
